<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fantom.LX</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <h1>Fantom.<span>LX</span></h1>
                <p>AI-Powered Study Helper</p>
            </div>
            
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <h2>Welcome Back</h2>
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required autocomplete="email" placeholder="your@email.com">
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required autocomplete="current-password" placeholder="••••••••">
                </div>
                <div class="options">
                    <label class="remember">
                        <input type="checkbox" id="remember-me">
                        <span>Remember me</span>
                    </label>
                    <a href="#" onclick="showForgotPassword(); return false;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-primary">Login →</button>
                <div id="login-error" class="error-message"></div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <h2>Create Account</h2>
                <div class="input-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required autocomplete="email" placeholder="your@email.com">
                </div>
                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required autocomplete="new-password" placeholder="••••••••">
                    <div class="password-strength" id="password-strength"></div>
                    <small class="password-hint">Min 8 characters, include numbers & symbols</small>
                </div>
                <div class="input-group">
                    <label for="reg-confirm">Confirm Password</label>
                    <input type="password" id="reg-confirm" required autocomplete="new-password" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">Create Account →</button>
                <div id="register-error" class="error-message"></div>
            </form>

            <!-- Forgot Password Form -->
            <form id="forgot-form" class="auth-form">
                <h2>Reset Password</h2>
                <p class="subtitle">Enter your email to receive a password reset link</p>
                <div class="input-group">
                    <label for="forgot-email">Email</label>
                    <input type="email" id="forgot-email" required placeholder="your@email.com">
                </div>
                <button type="submit" class="btn-primary">Send Reset Link →</button>
                <button type="button" class="btn-secondary" onclick="showTab('login')">Back to Login</button>
                <div id="forgot-message" class="success-message"></div>
            </form>
        </div>
        
        <div class="login-footer">
            <p>© 2026 Fantom.LX - AI-Powered Learning</p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
